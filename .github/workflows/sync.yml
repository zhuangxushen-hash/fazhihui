name: Auto Sync

on:
  push:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Build frontend
      run: |
        cd frontend
        npm install
        npm run build
      
    - name: Build backend
      run: |
        cd backend
        npm install
        npm run build
      
    - name: Verify build
      run: echo "构建验证通过"