version: '3.8'

services:
  backend:
    build: ./backend
    container_name: fazhihui-backend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - JWT_SECRET=your-secret-key-change-in-production
    volumes:
      - ./backend/data:/app/data
    networks:
      - fazhihui-network

  frontend:
    build: ./frontend
    container_name: fazhihui-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - fazhihui-network

networks:
  fazhihui-network:
    driver: bridge
